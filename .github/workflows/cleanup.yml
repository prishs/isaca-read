name: Cleanup old generated files

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history needed to read each file's commit date

      - name: Delete generated files older than 30 days
        run: |
          cutoff=$(( $(date -u +%s) - 30*24*3600 ))
          removed=0
          for f in digests/*.md notes/*.md briefs/*.md; do
            [ -e "$f" ] || continue
            ts=$(git log -1 --format=%ct -- "$f")
            if [ -n "$ts" ] && [ "$ts" -lt "$cutoff" ]; then
              echo "Removing $f (last commit $(date -u -d @$ts +%F))"
              git rm -q "$f"
              removed=$((removed+1))
            fi
          done
          echo "removed=$removed" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          if [ "${removed:-0}" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove generated files older than 30 days"
            git push
          else
            echo "Nothing to remove."
          fi
