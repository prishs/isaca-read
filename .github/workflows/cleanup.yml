name: Cleanup old digests

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete generated files older than 30 days
        run: |
          cutoff=$(date -u -d "30 days ago" +%Y-%m-%d)
          echo "Removing generated files dated before $cutoff"
          removed=0
          for dir in digests notes briefs; do
            [ -d "$dir" ] || continue
            for f in "$dir"/*.md; do
              [ -e "$f" ] || continue
              # Files are named by date: YYYY-MM-DD.md or YYYY-WW.md (notes)
              name=$(basename "$f" .md)
              # Only handle strict YYYY-MM-DD names; skip anything else
              if [[ "$name" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                if [[ "$name" < "$cutoff" ]]; then
                  git rm -q "$f"
                  removed=$((removed+1))
                fi
              fi
            done
          done
          echo "removed=$removed" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          if [ "${removed:-0}" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove digests older than 30 days"
            git push
          else
            echo "Nothing to remove."
          fi
