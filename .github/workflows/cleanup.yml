name: Cleanup old generated files

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Delete generated files older than 30 days
        run: |
          # Files are named by period, so age comes from the filename:
          # digests/YYYY-MM-DD.md, notes/YYYY-Www.md, briefs/YYYY-MM.md
          dcut=$(date -u -d "30 days ago" +%F)
          wcut=$(date -u -d "30 days ago" +%G-W%V)
          mcut=$(date -u -d "30 days ago" +%Y-%m)
          removed=0
          for f in digests/*.md notes/*.md briefs/*.md; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .md)
            old=no
            case "$f" in
              digests/*) [[ "$name" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && [[ "$name" < "$dcut" ]] && old=yes ;;
              notes/*)   [[ "$name" =~ ^[0-9]{4}-W[0-9]{2}$ ]] && [[ "$name" < "$wcut" ]] && old=yes ;;
              briefs/*)  [[ "$name" =~ ^[0-9]{4}-[0-9]{2}$ ]] && [[ "$name" < "$mcut" ]] && old=yes ;;
            esac
            if [ "$old" = yes ]; then
              echo "Removing $f"
              rm "$f"
              removed=$((removed+1))
            fi
          done
          echo "removed=$removed" >> "$GITHUB_ENV"

      # Recommit everything as a single orphan snapshot so gh-pages history
      # never accumulates deleted digests.
      - name: Squash gh-pages to a single snapshot commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan snapshot
          git add -A
          git commit -m "content snapshot (removed: ${removed:-0})"
          git push --force origin snapshot:gh-pages
