name: Daily digest

on:
  schedule:
    # 05:00 UTC = 7:00 AM Berlin in summer (CEST); winter runs 6:00 AM local
    - cron: "0 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  digest:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/daily-digest.md
      output_file: digests/{{DATE}}.md
    secrets: inherit
