name: Daily digest

on:
  schedule:
    # 01:30 UTC = 7:00 AM IST (India, no DST) on weekdays
    - cron: "30 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  digest:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/daily-digest.md
      output_file: digests/{{DATE}}.md
    secrets: inherit
