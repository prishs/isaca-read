name: Daily digest

on:
  schedule:
    # 01:17 UTC = 6:47 AM IST (India, no DST) on weekdays
    - cron: "17 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  digest:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/daily-digest.md
      research_prompt_file: prompts/daily-digest-research.md
      combined_prompt_file: prompts/daily-digest-combined.md
      output_file: digests/{{DATE}}.md
      two_phase: true
    secrets: inherit
