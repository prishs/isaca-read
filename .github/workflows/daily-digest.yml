name: Daily digest

on:
  schedule:
    # 00:30 UTC = 6:00 AM IST (India, no DST) on weekdays
    - cron: "30 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  digest:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/daily-digest.md
      output_file: digests/{{DATE}}.md
    secrets: inherit
