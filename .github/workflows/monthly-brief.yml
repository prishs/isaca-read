name: Monthly journal brief

on:
  schedule:
    # 1st of the month, 02:30 UTC = 8:00 AM IST
    - cron: "30 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  brief:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/monthly-brief.md
      output_file: briefs/{{MONTH}}.md
    secrets: inherit
