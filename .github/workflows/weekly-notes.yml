name: Weekly podcast notes

on:
  schedule:
    # Fridays 05:30 UTC (staggered after the daily digest run)
    - cron: "30 5 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  notes:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/weekly-notes.md
      output_file: notes/{{WEEK}}.md
    secrets: inherit
