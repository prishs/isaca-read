name: Weekly podcast notes

on:
  schedule:
    # Saturdays 01:47 UTC = 7:17 AM IST
    - cron: "47 1 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  notes:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/weekly-notes.md
      output_file: notes/{{WEEK}}.md
    secrets: inherit
