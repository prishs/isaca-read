name: Weekly podcast notes

on:
  schedule:
    # Saturdays 01:00 UTC = 6:30 AM IST
    - cron: "0 1 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  notes:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/weekly-notes.md
      output_file: notes/{{WEEK}}.md
    secrets: inherit
