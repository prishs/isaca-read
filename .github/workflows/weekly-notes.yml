name: Weekly podcast notes

on:
  schedule:
    # Fridays 02:00 UTC = 7:30 AM IST (staggered after the daily digest run)
    - cron: "0 2 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  notes:
    uses: ./.github/workflows/generate.yml
    with:
      prompt_file: prompts/weekly-notes.md
      output_file: notes/{{WEEK}}.md
    secrets: inherit
